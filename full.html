<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
    .container{
        display:flex;
    }
    
    .box{
        width:60px;
        height:60px;

    }
        .grow{

        }

    <div class="box"></div>
     <div class="box grow"></div>
     <div class="box"></div>
</body>
</html>
